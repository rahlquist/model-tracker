# model-tracker configuration template
# Copy to ~/.model-tracker/config.toml and edit. Override the path with --config.

# Storage backend: one of "csv", "sqlite", "postgres"
[storage]
backend = "csv"

# For CSV: a directory holding one file per table.
[storage.csv]
data_dir = "~/.model-tracker/data"

# For SQLite: a single database file.
[storage.sqlite]
db_path = "~/.model-tracker/data/model-tracker.sqlite"

# For PostgreSQL: no credentials here. Use secret references.
# Option A — Bitwarden Secrets Manager:
#   dsn = "$BWS:uuid-of-your-postgres-dsn-secret"
# Option B — Environment variable:
#   dsn = "$HERMES_SECRET:pg_dsn"   (reads HERMES_SECRET_PG_DSN)
# Option C — env var fallback:
#   dsn = ""                          (reads MODEL_TRACKER_PG_DSN from env)
# [storage.postgres]
# dsn = "$BWS:2e16ef0f-0349-4351-97cf-b485011b640b"

# Ranking weights/constants (optional overrides)
[ranking]
USAGE_WEIGHT = 1.0
PENALTY_INCOMPLETE = 2.0
PENALTY_ERRORS = 1.0
EXCLUDE_INCOMPLETE = true

# ---------------------------------------------------------------------------
# Auto-record at session start
# ---------------------------------------------------------------------------
# When enabled, the skill auto-detects system_info on every new session or
# re-entry, so you don't have to manually record it.
#
# auto_record = true | false
# trigger = "new-session" | "re-entry" | "both"
#   - "new-session": only when a context is empty (app launch, new chat)
#   - "re-entry":    when you re-enter a session you've previously exited
#   - "both":        always check at app startup
#
# If detection fails for any field, the user is prompted interactively.
[auto_record]
enabled = false
trigger = "new-session"

# ---------------------------------------------------------------------------
# Turn-based check-in
# ---------------------------------------------------------------------------
# After N turns in a session, the agent proactively asks the user whether
# they want to add a note and rate their experience with the current model.
# Set to 0 or omit to disable.
[checkin]
turn_threshold = 0  # 0 = disabled

# ---------------------------------------------------------------------------
# Static hardware overrides
# ---------------------------------------------------------------------------
# If you prefer to record fixed hardware values instead of auto-detecting,
# set them here. Leave blank to use auto-detection. The setup wizard can
# populate these for you.
[static_hardware]
os_make_version = ""
agent_make_version = ""
hardware_details = ""
